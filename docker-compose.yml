services:
  redis:
    image: redis:7-alpine
    container_name: hrbot-redis
    ports:
      - "16379:6379"   # host:container
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --appendonly yes
      --requirepass "${REDIS_PASSWORD:-abcd1234}"
    volumes:
      - /srv/tbot/redis:/data
      - ./data/volumes/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - avairy-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hrbot-postgres
    ports:
      - "55432:5432"   # host:container
    environment:
      POSTGRES_DB: "${PG_DATABASE:-qa_db}"
      POSTGRES_USER: "${PG_USER:-twave_01}"
      POSTGRES_PASSWORD: "${PG_PASSWORD:-twave_01password}"
      TZ: "Asia/Tokyo"
      PGTZ: "Asia/Tokyo"
    volumes:
      - /srv/tbot/db:/var/lib/postgresql/data
    networks:
      - avairy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-twave_01} -d ${PG_DATABASE:-qa_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  solr:
    image: solr:9.8.1
    container_name: hrbot-solr
    ports:
      - "8983:8983"
    environment:
      SOLR_MODULES: "extraction"
      SOLR_CORE_NAME: "${SOLR_CORE_NAME:-mycore}"
    user: "0:0"
    command: >
      bash -lc "
        mkdir -p /var/solr &&
        chown -R 8983:8983 /var/solr &&
        exec gosu solr solr-precreate ${SOLR_CORE_NAME:-mycore} /opt/solr/server/solr/configsets/sample_techproducts_configs
      "
    volumes:
      - /srv/tbot/solr:/var/solr
      - /srv/tbot/storage/docs:/data/docs
    networks:
      - avairy-network
    restart: unless-stopped

  apisix-dashboard:
    profiles: ["apisix"]
    image: apache/apisix-dashboard:3.0.0-centos
    container_name: hrbot-apisix-dashboard
    ports:
      - "9000:9000"
    networks:
      - avairy-network
    restart: unless-stopped

  rag-python:
    build:
      context: .
      dockerfile: Dockerfile
      target: rag
    container_name: hrbot-rag-python
    ports:
      - "8010:8010"
    environment:
      PYTHONUNBUFFERED: "1"
      RAG_FORCE_GPU_ONLY: "${RAG_FORCE_GPU_ONLY:-0}"
      SOLR_URL: "${SOLR_URL:-http://solr:8983}"
      SOLR_CORE_NAME: "${SOLR_CORE_NAME:-mycore}"
    volumes:
      - ./rag:/app/rag
      - ./config:/app/config:ro
      - ./uploads:/app/uploads
      - ./rag/data/model:/app/rag/data/model
      - ./rag/app/rag_db:/app/rag/app/rag_db
    networks:
      - avairy-network
    depends_on:
      - solr
    restart: unless-stopped

  vllm-single:
    profiles: ["llm-local"]
    image: "${LLM_GATEWAY_IMAGE:-vllm/vllm-openai:latest}"
    container_name: hrbot-vllm-single
    platform: "linux/amd64"
    ports:
      - "8000:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - "${LLM_GATEWAY_MODEL_SOURCE:-openai/gpt-oss-20b}"
      - --served-model-name
      - "openai/gpt-oss-20b"
    volumes:
      - llm-model-cache:/root/.cache/huggingface
    networks:
      avairy-network:
        aliases:
          - llm-gateway
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        NODE_VERSION: 22.22.0
        PNPM_VERSION: 9.12.3
    container_name: hrbot-api
    ports:
      - "${API_PORT:-8080}:8080"
      - "${BULL_BOARD_PORT:-9999}:9999"
    env_file:
      - ./.env
      - ./api/.env
    environment:
      DB_MODE: "postgres"
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: "${PG_DATABASE:-qa_db}"
      PG_USER: "${PG_USER:-twave_01}"
      PG_PASSWORD: "${PG_PASSWORD:-twave_01password}"
      PG_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-abcd1234}"
      REDIS_DB: 0
      SOLR_URL: "${SOLR_URL:-http://solr:8983}"
      SOLR_CORE_NAME: "${SOLR_CORE_NAME:-mycore}"

      # External (host) OpenAI-compatible gateway default (Linux needs extra_hosts below).
      # Override with `LLM_BASE_URL_OVERRIDE=http://vllm-single:8000/v1` when using the optional `vllm-single` service.
      LLM_BASE_URL: "${LLM_BASE_URL_OVERRIDE:-http://host.docker.internal:9080/v1}"
      LLM_MODEL: "${LLM_MODEL:-openai/gpt-oss-20b}"
      RAG_API: "${RAG_API:-http://rag-python:8010}"
      RAG_BACKEND_URL: "${RAG_BACKEND_URL:-http://rag-python:8010}"
      RAG_BACKEND_HOST: rag-python
      RAG_BACKEND_PORT: 8010

      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8080
      FRONTEND_HOST: "${FRONTEND_HOST:-ui}"
      FRONTEND_PORT: 7001
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      PUBLIC_API_BASE_URL: "${PUBLIC_API_BASE_URL:-}"
      AZURE_AD_REDIRECT_URI: "${AZURE_AD_REDIRECT_URI:-}"
      NODE_ENV: "production"
    volumes:
      - ./config:/app/config:ro
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - avairy-network
    depends_on:
      - redis
      - postgres
      - solr
      - rag-python
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        NODE_VERSION: 22.22.0
        PNPM_VERSION: 9.12.3
    container_name: hrbot-worker
    command: ["node", "dist/queue/worker.js"]
    env_file:
      - ./.env
      - ./api/.env
    environment:
      DB_MODE: "postgres"
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: "${PG_DATABASE:-qa_db}"
      PG_USER: "${PG_USER:-twave_01}"
      PG_PASSWORD: "${PG_PASSWORD:-twave_01password}"
      PG_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-abcd1234}"
      REDIS_DB: 0
      SOLR_URL: "${SOLR_URL:-http://solr:8983}"
      SOLR_CORE_NAME: "${SOLR_CORE_NAME:-mycore}"
      LLM_BASE_URL: "${LLM_BASE_URL_OVERRIDE:-http://host.docker.internal:9080/v1}"
      LLM_MODEL: "${LLM_MODEL:-openai/gpt-oss-20b}"
      RAG_API: "${RAG_API:-http://rag-python:8010}"
      RAG_BACKEND_URL: "${RAG_BACKEND_URL:-http://rag-python:8010}"
      RAG_BACKEND_HOST: rag-python
      RAG_BACKEND_PORT: 8010
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8080
      FRONTEND_HOST: "${FRONTEND_HOST:-ui}"
      FRONTEND_PORT: 7001
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      PUBLIC_API_BASE_URL: "${PUBLIC_API_BASE_URL:-}"
      AZURE_AD_REDIRECT_URI: "${AZURE_AD_REDIRECT_URI:-}"
      NODE_ENV: "production"
    volumes:
      - ./config:/app/config:ro
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - avairy-network
    depends_on:
      - redis
      - postgres
      - solr
      - rag-python
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: ui
      args:
        NODE_VERSION: 22.22.0
        PNPM_VERSION: 9.12.3
    container_name: hrbot-ui
    ports:
      - "${WEB_PORT:-7001}:7001"
    depends_on:
      - api
    networks:
      - avairy-network
    restart: unless-stopped

networks:
  avairy-network:
    driver: bridge

volumes:
  llm-model-cache:
